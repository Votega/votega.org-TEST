  const urlParams      = new URLSearchParams(window.location.search);
  const memberId       = urlParams.get('id');
  const selectedCounty = urlParams.get('county');

  if (!memberId) {
    document.getElementById('memberDetails').innerHTML =
      '<p>No member selected. <a href="ga-representatives.html">Go back</a></p>';
  } else {
    loadMemberDetails(memberId);
  }

  function getBasePath() {
    return window.location.pathname.includes('/votega.org-TEST/') ? '/votega.org-TEST/' : '/';
  }

  async function loadMemberDetails(id) {
    const statusLine = document.getElementById('status');
    statusLine.textContent = 'Loading member details…';

    try {
      const res = await fetch(DATA_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const data  = await res.json();
      const all   = data.members || [];
      const member = all.find(m => m.id === id);

      if (!member) throw new Error('Member not found in data.');

      displayMemberDetails(member);
      displaySidebar(member, all);
      statusLine.textContent = '';
    } catch (err) {
      console.error(err);
      statusLine.textContent = err.message.includes('HTTP')
        ? 'Data file missing or inaccessible. Check that assets/data/ga-members.json exists.'
        : err.message;
      document.getElementById('memberDetails').innerHTML =
        '<p>Error loading details. <a href="ga-representatives.html">Go back</a></p>';
    }
  }

  function getPartyIconHtml(party) {
    if (!party) return '';
    const p = party.toLowerCase();
    if (p.includes('democrat')) {
      return `<a title="Democratic Party (United States), Public domain, via Wikimedia Commons" href="https://commons.wikimedia.org/wiki/File:Democratic_Disc.svg" target="_blank"><img width="22" alt="Donkey logo of the Democratic party." src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/93/Democratic_Disc.svg/44px-Democratic_Disc.svg.png" style="vertical-align:middle;"></a>`;
    }
    if (p.includes('republican')) {
      return `<a title="Republican Party, Public domain, via Wikimedia Commons" href="https://commons.wikimedia.org/wiki/File:Republican_Disc.svg" target="_blank"><img width="22" alt="Elephant logo of the Republican Party." src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/93/Republican_Disc.svg/44px-Republican_Disc.svg.png" style="vertical-align:middle;"></a>`;
    }
    return '';
  }

  function displayMemberDetails(member) {
    const currentYear = new Date().getFullYear();
    const detailsDiv  = document.getElementById('memberDetails');

    const name    = member.name || 'Unknown';
    const imageHtml = member.imageUrl
      ? `<img src="${member.imageUrl}" alt="${name}" style="max-width:200px;margin-bottom:1rem;border-radius:8px;">`
      : '';

    const phoneHtml   = member.phone   ? `<p><strong>Phone:</strong> ${member.phone}</p>`   : '';
    const addressHtml = member.address ? `<p><strong>Address:</strong> ${member.address}</p>` : '';
    const emailHtml   = member.email   ? `<p><strong>Email:</strong> <a href="mailto:${member.email}">${member.email}</a></p>` : '';
    const websiteHtml = member.officialWebsiteUrl
      ? `<p><strong>Official Website:</strong> <a href="${member.officialWebsiteUrl}" target="_blank">${member.officialWebsiteUrl}</a></p>`
      : '';

    detailsDiv.innerHTML = `
      ${imageHtml}
      <h2>${name}</h2>
      ${member.birthYear
        ? `<p style="display:flex;justify-content:space-between;">
             <span><strong>Birth Year:</strong> ${member.birthYear}</span>
             <span><strong>Age:</strong> ${currentYear - member.birthYear}</span>
           </p>`
        : ''}
      <p><strong>Title:</strong> ${member.title || 'N/A'}</p>
      <p><strong>Party:</strong> ${member.party || 'N/A'} ${getPartyIconHtml(member.party)}</p>
      <p><strong>Chamber:</strong> ${member.chamber || 'N/A'}</p>
      <p><strong>District:</strong> ${member.district ?? 'N/A'}</p>
      ${phoneHtml}
      ${addressHtml}
      ${emailHtml}
      ${websiteHtml}
      <p><a href="ga-representatives.html">Search for another member</a></p>
    `;
  }

  function renderGroup(members, label, currentId, basePath, countyParam) {
    if (!members.length) return '';
    const items = members.map(m => {
      const isCurrent = m.id === currentId;
      const sub = `District ${m.district} · ${m.party || ''}`;
      if (isCurrent) {
        return `<span class="sidebar-member current">${m.name}<br><span class="sidebar-member-sub">${sub}</span></span>`;
      }
      return `<a class="sidebar-member" href="${basePath}ga-member.html?id=${encodeURIComponent(m.id)}${countyParam}">${m.name}<br><span class="sidebar-member-sub">${sub}</span></a>`;
    }).join('');
    return `<div class="sidebar-group-label">${label}</div>${items}`;
  }

  function displaySidebar(current, all) {
    const chamber = current.chamber;
    if (!chamber) return;

    const basePath    = getBasePath();
    const countyParam = selectedCounty ? `&county=${encodeURIComponent(selectedCounty)}` : '';

    const otherChamber     = chamber === 'Senate' ? 'House of Representatives' : 'Senate';
    const primaryLabel     = chamber === 'Senate' ? 'Senate' : 'House';
    const secondaryLabel   = chamber === 'Senate' ? 'House' : 'Senate';

    let primaryPeers, secondaryPeers, titleText;

    if (selectedCounty) {
      const primaryLookup   = chamber === 'Senate' ? COUNTY_SENATE_DISTRICTS : COUNTY_HOUSE_DISTRICTS;
      const secondaryLookup = chamber === 'Senate' ? COUNTY_HOUSE_DISTRICTS  : COUNTY_SENATE_DISTRICTS;

      primaryPeers = all
        .filter(m => m.chamber === chamber && (primaryLookup[selectedCounty] || []).includes(m.district))
        .sort((a, b) => (a.district ?? 999) - (b.district ?? 999));

      secondaryPeers = all
        .filter(m => m.chamber === otherChamber && (secondaryLookup[selectedCounty] || []).includes(m.district))
        .sort((a, b) => (a.district ?? 999) - (b.district ?? 999));

      titleText = `${selectedCounty} County`;
    } else {
      // Fallback for direct links: ±5 nearby districts in same chamber, no cross-chamber
      const currentDist = current.district ?? 0;
      primaryPeers = all
        .filter(m => m.chamber === chamber && Math.abs((m.district ?? 0) - currentDist) <= 5)
        .sort((a, b) => (a.district ?? 999) - (b.district ?? 999));
      secondaryPeers = [];
      titleText = `Nearby ${primaryLabel} Districts`;
    }

    if (primaryPeers.length <= 1 && secondaryPeers.length === 0) return;

    document.getElementById('sidebarTitle').textContent = titleText;
    document.getElementById('sidebarContent').innerHTML =
      renderGroup(primaryPeers,   primaryLabel,   current.id, basePath, countyParam) +
      renderGroup(secondaryPeers, secondaryLabel, current.id, basePath, countyParam);
    document.getElementById('stateSidebar').style.display = 'block';
  }
