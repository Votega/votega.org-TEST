name: Update Congress.gov current members data

permissions:
  contents: write  # Allows the bot to commit and push changes
  
on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *' # daily at 06:00 UTC

jobs:
  update-data:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Ensure full git history if needed

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Generate current member data (includes leadership positions)
        run: python assets/scripts/generate_current_members_data.py assets/data/current-members.json
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}

      - name: Validate generated data
        run: |
          if [ ! -f assets/data/current-members.json ]; then
            echo "Error: current-members.json was not generated"
            exit 1
          fi
          # Check that file is valid JSON
          python -c "import json; json.load(open('assets/data/current-members.json'))" 

      - name: Commit and push generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/current-members.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update current Congress member data (includes leadership positions)"
            git push
          fi
