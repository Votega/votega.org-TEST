name: Update Congress.gov current members data

permissions:
  contents: write  # Allows the bot to commit and push changes
  
on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *' # daily at 06:00 UTC

jobs:
  update-data:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate current member data
        run: python scripts/generate_current_members_data.py assets/data/current-members.json
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}

      - name: Commit and push generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/current-members.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update current Congress member data"
            git push
          fi
