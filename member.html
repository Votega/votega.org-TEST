<h1>Legislative Member Details</h1>

<div id="memberDetails" style="margin-top: 2rem; padding: 1rem; border: 1px solid #ccc; border-radius: 8px;">
  <p>Loading member information...</p>
</div>

<div class="msg" id="status"></div>

<script>
  // Get bioguideId from URL parameter
  const urlParams = new URLSearchParams(window.location.search);
  const bioguideId = urlParams.get('bioguideId');

  if (!bioguideId) {
    document.getElementById('memberDetails').innerHTML = '<p>No member selected. <a href="my-representatives.html">Go back</a></p>';
  } else {
    loadMemberDetails(bioguideId);
  }

  async function loadMemberDetails(bioguideId) {
    const API_ROOT = 'https://api.congress.gov/v3';
    const API_KEY = 'Oze0IkjnsuXYtNVpM3NXTqHqYRM8jgXnvbdiZVy1'; // Same as in congress.js

    const statusLine = document.getElementById('status');
    statusLine.textContent = 'Loading member details…';

    try {
      const url = `${API_ROOT}/member/${bioguideId}?format=json&api_key=${API_KEY}`;
      console.log('GET', url);
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const data = await res.json();
      const member = data.member || {};

      displayMemberDetails(member);
      statusLine.textContent = '';
    } catch (err) {
      console.error('loadMemberDetails()', err);
      statusLine.textContent = err.message.includes('HTTP') ?
        'API error: ' + err.message :
        'Could not load member details. Check the console.';
      document.getElementById('memberDetails').innerHTML = '<p>Error loading details. <a href="my-representatives.html">Go back</a></p>';
    }
  }

  function displayMemberDetails(member) {
    const detailsDiv = document.getElementById('memberDetails');

    // Get name (prefer directOrderName, fallback to firstName + lastName)
    const name = member.directOrderName || `${member.firstName} ${member.lastName}` || 'Unknown';

    // Get party from partyHistory (most recent or first entry)
    const party = member.partyHistory?.[0]?.partyName || 'N/A';

    // Get current chamber and district (if available in current term)
    const currentTerm = member.terms?.[0] || {};
    const chamber = currentTerm.chamber || 'N/A';
    const district = currentTerm.district ? `District ${currentTerm.district}` : (currentTerm.memberType === 'Senator' ? 'U.S. Senator' : 'N/A');

    // Note: website, phone, address, and biography are not provided by Congress.gov API
    const imageUrl = member.depiction?.imageUrl;
    const imageHtml = imageUrl ? `<img src="${imageUrl}" alt="${name}" style="max-width: 200px; margin-bottom: 1rem;">` : '';

    const html = `
      ${imageHtml}
      <h2>${name}</h2>
      <p><strong>Party:</strong> ${party}</p>
      <p><strong>State:</strong> ${member.state || 'N/A'}</p>
      <p><strong>District:</strong> ${district}</p>
      <p><strong>Chamber:</strong> ${chamber}</p>
      <p style="color: #666; font-size: 0.9em; margin-top: 1rem;"><em>Note: Contact information (website, phone, address) is not provided by Congress.gov API. Visit senate.gov or house.gov for current contact details.</em></p>
      <p><a href="my-representatives.html">Search for another member</a></p>
    `;
    detailsDiv.innerHTML = html;
  }
</script>
