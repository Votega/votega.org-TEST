<h1>Legislative Member Details</h1>

<div id="memberDetails" style="margin-top: 2rem; padding: 1rem; border: 1px solid #ccc; border-radius: 8px;">
  <p>Loading member information...</p>
</div>

<div class="msg" id="status"></div>

<!-- Debug panel (remove after testing) -->
<div id="debugPanel" style="margin-top: 1rem; padding: 1rem; background: #f5f5f5; border: 1px solid #ddd; font-family: monospace; font-size: 12px; display: none;">
  <h3>Debug Info</h3>
  <pre id="debugContent"></pre>
</div>

<script>
  const DEBUG = true; // Set to false after testing

  // Get bioguideId from URL parameter
  const urlParams = new URLSearchParams(window.location.search);
  const bioguideId = urlParams.get('bioguideId');

  if (!bioguideId) {
    document.getElementById('memberDetails').innerHTML = '<p>No member selected. <a href="my-representatives.html">Go back</a></p>';
  } else {
    loadMemberDetails(bioguideId);
  }

  async function loadMemberDetails(bioguideId) {
    const DATA_URL = 'assets/data/current-members.json';
    const statusLine = document.getElementById('status');
    statusLine.textContent = 'Loading member details…';

    try {
      const res = await fetch(DATA_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const data = await res.json();
      const member = (data.members || []).find(m => m.bioguideId === bioguideId) || {};
      
      if (!member.bioguideId) {
        throw new Error('Member not found in prebuilt data');
      }

      // Debug: Show raw member data
      if (DEBUG) {
        document.getElementById('debugPanel').style.display = 'block';
        document.getElementById('debugContent').textContent = JSON.stringify(member, null, 2);
      }

      displayMemberDetails(member);
      statusLine.textContent = '';
    } catch (err) {
      console.error('loadMemberDetails()', err);
      const message = err.message.includes('HTTP') ?
        'Data file missing or inaccessible. Check that assets/data/current-members.json exists.' :
        err.message;
      statusLine.textContent = message;
      document.getElementById('memberDetails').innerHTML = '<p>Error loading details. <a href="my-representatives.html">Go back</a></p>';
    }
  }

  function displayMemberDetails(member) {
    const detailsDiv = document.getElementById('memberDetails');

    const name = member.name || 'Unknown';
    const party = member.partyName || 'N/A';
    const state = member.state || 'N/A';

    const currentTerm = member.terms?.item?.slice(-1)[0] || {};
    const chamber = currentTerm.chamber || 'N/A';
    const district = member.district ? `District ${member.district}` : (chamber === 'Senate' ? 'U.S. Senator' : 'N/A');
         
    const termsArr = member.terms?.item || [];
    const terms = Array.isArray(termsArr) ? termsArr : [termsArr];
    const startYears = terms.map(t => t.startYear).filter(y => typeof y === 'number');
    const startYear = startYears.length ? Math.max(...startYears) : 'N/A';
    const currentYear = new Date().getFullYear();
    const yearsInOffice = startYear ? (currentYear - startYear) : 'N/A';
      
    const imageUrl = member.depiction?.imageUrl;
    const imageHtml = imageUrl ? `<img src="${imageUrl}" alt="${name}" style="max-width: 200px; margin-bottom: 1rem;">` : '';

    // Leadership - Try multiple possible field names
    const leadership = member.leadership || member.leadershipPositions || [];
    
    let leadershipHtml = '';
    if (leadership && leadership.length > 0) {
      // Handle different possible structures
      const leadershipTitles = leadership.map(l => {
        if (typeof l === 'string') return l;
        if (l.title) return l.title;
        if (l.positionTitle) return l.positionTitle;
        if (l.name) return l.name;
        return JSON.stringify(l);
      }).join(', ');
      
      leadershipHtml = `<p><strong>Leadership Position(s):</strong> ${leadershipTitles}</p>`;
    } else {
      // Show "No leadership position" only in debug mode
      if (DEBUG) {
        leadershipHtml = '<p><strong>Leadership Position(s):</strong> None (or data not fetched)</p>';
      }
    }

    const html = `
      ${imageHtml}
      <h2>${name}</h2>
      <p><strong>Party:</strong> ${party}</p>
      <p><strong>State:</strong> ${state}</p>
      <p><strong>District:</strong> ${district}</p>
      <p><strong>Chamber:</strong> ${chamber}</p>
      ${leadershipHtml}
      <p><strong>First Term (Current Chamber):</strong> ${startYear}</p>
      <p><strong>Years in Office (Current Chamber):</strong> ${yearsInOffice}</p>
         
      <p><a href="my-representatives.html">Search for another member</a></p>
    `;
    detailsDiv.innerHTML = html;
  }
</script>
