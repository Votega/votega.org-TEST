---
layout: default
title: Legislative Member Details
permalink: /member.html
---

<h1>Legislative Member Details</h1>

<style>
  #pageLayout {
    display: flex;
    gap: 1.5rem;
    align-items: flex-start;
    margin-top: 2rem;
  }
  #memberDetails {
    flex: 1;
    min-width: 0;
    padding: 1rem;
    border: 1px solid #ccc;
    border-radius: 8px;
  }
  #stateSidebar {
    width: 240px;
    flex-shrink: 0;
    padding: 1rem;
    border: 1px solid #ccc;
    border-radius: 8px;
    position: sticky;
    top: 1rem;
    max-height: 80vh;
    overflow-y: auto;
    display: none;
  }
  #stateSidebar h3 {
    margin: 0 0 0.75rem 0;
    font-size: 0.95rem;
    border-bottom: 1px solid #ccc;
    padding-bottom: 0.5rem;
  }
  .sidebar-group-label {
    font-size: 0.75rem;
    font-weight: bold;
    text-transform: uppercase;
    color: #666;
    margin: 0.75rem 0 0.25rem 0;
  }
  .sidebar-member {
    display: block;
    padding: 0.3rem 0.4rem;
    border-radius: 4px;
    text-decoration: none;
    font-size: 0.875rem;
    color: inherit;
    line-height: 1.3;
  }
  .sidebar-member:hover {
    background: #f0f0f0;
  }
  .sidebar-member.current {
    background: #e8f0fe;
    font-weight: bold;
    cursor: default;
    pointer-events: none;
  }
  .sidebar-member-sub {
    font-size: 0.75rem;
    color: #666;
  }
  @media (max-width: 700px) {
    #pageLayout { flex-direction: column; }
    #stateSidebar { width: auto; position: static; max-height: 300px; display: block !important; }
  }
</style>

<div id="pageLayout">
  <div id="memberDetails">
    <p>Loading member information...</p>
  </div>
  <div id="stateSidebar">
    <h3 id="sidebarTitle">State Delegation</h3>
    <div id="sidebarContent"></div>
  </div>
</div>

<div class="msg" id="status"></div>

<script>
  const DEBUG = false;

  const urlParams = new URLSearchParams(window.location.search);
  const bioguideId = urlParams.get('bioguideId');

  if (!bioguideId) {
    document.getElementById('memberDetails').innerHTML = '<p>No member selected. <a href="my-representatives.html">Go back</a></p>';
  } else {
    loadMemberDetails(bioguideId);
  }

  async function loadMemberDetails(bioguideId) {
    const DATA_URL = 'assets/data/current-members.json';
    const statusLine = document.getElementById('status');
    statusLine.textContent = 'Loading member details…';

    try {
      const res = await fetch(DATA_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const data = await res.json();
      const allMembers = data.members || [];
      const member = allMembers.find(m => m.bioguideId === bioguideId) || {};

      if (!member.bioguideId) {
        throw new Error('Member not found in prebuilt data');
      }

      if (DEBUG) {
        console.log('Member data:', member);
      }

      displayMemberDetails(member);
      displaySidebar(member, allMembers);
      statusLine.textContent = '';
    } catch (err) {
      console.error('loadMemberDetails()', err);
      const message = err.message.includes('HTTP') ?
        'Data file missing or inaccessible. Check that assets/data/current-members.json exists.' :
        err.message;
      statusLine.textContent = message;
      document.getElementById('memberDetails').innerHTML = '<p>Error loading details. <a href="my-representatives.html">Go back</a></p>';
    }
  }

  function getBasePath() {
    const pathname = window.location.pathname;
    return pathname.includes('/votega.org-TEST/') ? '/votega.org-TEST/' : '/';
  }

  function getMemberName(m) {
    const honorific = m.honorificName || '';
    const first = m.firstName || '';
    const last = m.lastName || '';
    const fallback = m.directOrderName || m.name || 'Unknown';
    return (first && last) ? `${honorific} ${first} ${last}`.trim() : (honorific ? `${honorific} ${fallback}` : fallback);
  }

  function displaySidebar(currentMember, allMembers) {
    const state = currentMember.state || currentMember.stateName;
    if (!state) return;

    const statemates = allMembers.filter(m =>
      (m.state === state || m.stateName === state) && m.currentMember !== false
    );

    if (statemates.length <= 1) return;

    const senators = statemates
      .filter(m => {
        const terms = m.terms?.item || m.terms || [];
        return (Array.isArray(terms) ? terms : [terms]).some(t => t.chamber === 'Senate');
      })
      .sort((a, b) => getMemberName(a).localeCompare(getMemberName(b)));

    const reps = statemates
      .filter(m => {
        const terms = m.terms?.item || m.terms || [];
        return (Array.isArray(terms) ? terms : [terms]).some(t => t.chamber === 'House of Representatives');
      })
      .sort((a, b) => (a.district ?? 999) - (b.district ?? 999));

    const basePath = getBasePath();

    function renderGroup(members, label) {
      if (!members.length) return '';
      const items = members.map(m => {
        const name = getMemberName(m);
        const isCurrent = m.bioguideId === currentMember.bioguideId;
        const sub = m.district != null ? `District ${m.district} · ${m.partyName || ''}` : (m.partyName || '');
        if (isCurrent) {
          return `<span class="sidebar-member current">${name}<br><span class="sidebar-member-sub">${sub}</span></span>`;
        }
        return `<a class="sidebar-member" href="${basePath}member.html?bioguideId=${m.bioguideId}">${name}<br><span class="sidebar-member-sub">${sub}</span></a>`;
      }).join('');
      return `<div class="sidebar-group-label">${label}</div>${items}`;
    }

    document.getElementById('sidebarTitle').textContent = `${state} Delegation`;
    document.getElementById('sidebarContent').innerHTML =
      renderGroup(senators, 'Senate') + renderGroup(reps, 'House');
    document.getElementById('stateSidebar').style.display = 'block';
  }

  function getPartyIconHtml(party) {
    if (!party) return '';
    const p = party.toLowerCase();
    if (p.includes('democrat')) {
      return `<img width="22" alt="Donkey logo of the Democratic party." src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/93/Democratic_Disc.svg/44px-Democratic_Disc.svg.png" style="vertical-align:middle;">`;
    }
    if (p.includes('republican')) {
      return `<img width="22" alt="Elephant logo of the Republican Party." src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/93/Republican_Disc.svg/44px-Republican_Disc.svg.png" style="vertical-align:middle;">`;
    }
    return '';
  }

  function displayMemberDetails(member) {
    const detailsDiv = document.getElementById('memberDetails');

    const honorific = member.honorificName || '';
    const firstName = member.firstName || '';
    const lastName = member.lastName || '';
    const fallbackName = member.directOrderName || member.name || 'Unknown';
    const fullName = (firstName && lastName)
      ? `${honorific} ${firstName} ${lastName}`.trim()
      : (honorific ? `${honorific} ${fallbackName}` : fallbackName);

    const party = member.partyName || (member.partyHistory && member.partyHistory.item ? member.partyHistory.item[0]?.partyName : 'N/A');
    const state = member.state || member.stateName || 'N/A';

    const currentTerm = member.terms?.item?.slice(-1)[0] || {};
    const chamber = currentTerm.chamber || 'N/A';
    const district = member.district ? `District ${member.district}` : (chamber === 'Senate' || chamber === 'House of Representatives' ? 'U.S. Senator' : 'N/A');

    const termsArr = member.terms?.item || [];
    const terms = Array.isArray(termsArr) ? termsArr : [termsArr];
    const startYears = terms.map(t => t.startYear).filter(y => typeof y === 'number');
    const startYear = startYears.length ? Math.max(...startYears) : 'N/A';
    const currentYear = new Date().getFullYear();
    const yearsInOffice = startYear ? (currentYear - startYear) : 'N/A';

    const imageUrl = member.depiction?.imageUrl;
    const imageHtml = imageUrl ? `<img src="${imageUrl}" alt="${fullName}" style="max-width: 200px; margin-bottom: 1rem; border-radius: 8px;">` : '';

    // Leadership positions
    const leadership = member.leadership || [];
    let leadershipHtml = '';
    if (leadership.length > 0) {
      const leadershipTitles = leadership.map(l => {
        const title = l.title || l.type || 'Unknown Position';
        const congress = l.congress ? ` (${l.congress}${l.current === true ? ', Current' : ''})` : '';
        return `${title}${congress}`;
      }).join(', ');
      leadershipHtml = `<p><strong>Leadership Position(s):</strong> ${leadershipTitles}</p>`;
    }

    // Committees
    const committees = member.committees || [];
    let committeesHtml = '';
    if (committees.length > 0) {
      const committeeItems = committees.map(c => `<li>${c}</li>`).join('');
      committeesHtml = `<p><strong>Committees:</strong></p><ul>${committeeItems}</ul>`;
    }

    // Contact information
    const contactInfo = member.contactInfo || {};
    let contactHtml = '';
    if (contactInfo.phoneNumber || contactInfo.officeAddress) {
      const phone = contactInfo.phoneNumber ? `<br>📞 ${contactInfo.phoneNumber}` : '';
      let addressStr = contactInfo.officeAddress || '';
      if (addressStr) {
        const zip = contactInfo.zipCode ? String(contactInfo.zipCode) : '';
        if (zip && !addressStr.includes(zip)) {
          const city = contactInfo.city || '';
          const region = contactInfo.district || '';
          addressStr = [addressStr, city, region, zip].filter(Boolean).join(', ').replace(/, (\d{5})$/, ' $1');
        }
      }
      const address = addressStr ? `<br>📍 ${addressStr}` : '';
      contactHtml = `<p><strong>Office Contact:</strong>${address}${phone}</p>`;
    }

    // Official website
    const websiteHtml = member.officialWebsiteUrl ?
      `<p><strong>Official Website:</strong> <a href="${member.officialWebsiteUrl}" target="_blank">${member.officialWebsiteUrl}</a></p>` : '';

    const html = `
      ${imageHtml}
      <h2>${fullName}</h2>
      ${member.birthYear ? `<p style="display:flex;justify-content:space-between;"><span><strong>Birth Year:</strong> ${member.birthYear}</span><span><strong>Age:</strong> ${currentYear - member.birthYear}</span></p>` : ''}
      <p style="display:flex;justify-content:space-between;"><span><strong>First Term (Current Chamber):</strong> ${startYear}</span><span><strong>Years in Office:</strong> ${yearsInOffice}</span></p>
      <p><strong>Party:</strong> ${party} ${getPartyIconHtml(party)}</p>
      <p><strong>State:</strong> ${state}</p>
      <p><strong>District:</strong> ${district}</p>
      <p><strong>Chamber:</strong> ${chamber}</p>
      ${leadershipHtml}
      ${committeesHtml}
      ${contactHtml}
      ${websiteHtml}

      <p><a href="my-representatives.html">Search for another member</a></p>
    `;
    detailsDiv.innerHTML = html;
  }
</script>
